name = "ordwell"
main = ".open-next/worker.js"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

assets = { directory = ".open-next/assets", binding = "ASSETS" }

[vars]
SUPABASE_STORAGE_BUCKET = "documents"
DAILY_USER_ANALYSIS_LIMIT = "10"
DAILY_GLOBAL_ANALYSIS_LIMIT = "200"
ANTHROPIC_MODEL = "claude-sonnet-4-6"
# Erlaubte Origins (CSRF). Kommagetrennt – alle verbundenen Domains. Die App
# funktioniert dadurch gleichzeitig auf workers.dev und den neuen Domains.
APP_ORIGIN = "https://ordwell.de,https://www.ordwell.de,https://ordwell.ismailkhudida.workers.dev"
# Kanonische Hauptdomain für Links in Erinnerungs-E-Mails (Server, ohne Request-Kontext).
NEXT_PUBLIC_APP_URL = "https://ordwell.de"
# Absender der Erinnerungs-Mails. Erst auf eine ordwell.de-Adresse umstellen,
# wenn die Domain in Resend verifiziert ist (siehe SETUP_DOMAINS.md).
REMINDER_FROM_EMAIL = "Ordwell <onboarding@resend.dev>"
# Empfänger der Cron-Ausfall-Alarme (Dead-Man-Switch /api/cron/health).
ALERT_EMAIL = "ismail.khudida@recmo.de"
# Max. Alter des letzten Erinnerungs-Laufs in Stunden, bevor alarmiert wird
# (täglicher Cron + Puffer).
CRON_MAX_AGE_HOURS = "26"
