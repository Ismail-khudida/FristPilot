SUPABASE_STORAGE_BUCKET = "documents"
DAILY_USER_ANALYSIS_LIMIT = "10"
DAILY_GLOBAL_ANALYSIS_LIMIT = "200"
ANTHROPIC_MODEL = "claude-opus-4-8"
